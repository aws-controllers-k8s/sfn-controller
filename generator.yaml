ignore:
  resource_names:
  - StateMachineAlias
  field_paths:
  - CreateStateMachineInput.EncryptionConfiguration
  - CreateActivityInput.EncryptionConfiguration
  - CreateStateMachineInput.Publish
  - CreateStateMachineInput.VersionDescription
  - CreateStateMachineOutput.StateMachineVersionArn

operations:
  PublishStateMachineVersion:
    operation_type:
      - Create
    resource_name:
      - StateMachineVersion

resources:
  StateMachine:
    fields:
      Name:
        is_immutable: true
      Tags:
        compare:
          is_ignored: True
    exceptions:
      errors:
        404:
          code: StateMachineDoesNotExist
    hooks:
      delta_pre_compare:
        code: customPreCompare(delta, a, b)
      sdk_read_one_post_set_output:
        template_path: hooks/statemachine/sdk_read_one_post_set_output.go.tpl
    update_operation:
      custom_method_name: customUpdateStateMachine
  Activity:
    exceptions:
      errors:
        404:
          code: ActivityDoesNotExist
    fields:
      Name:
        is_immutable: true
      Tags:
        compare:
          is_ignored: True
    hooks:
      delta_pre_compare:
        code: customPreCompare(delta, a, b)
      sdk_read_one_post_set_output:
        template_path: hooks/activity/sdk_read_one_post_set_output.go.tpl
    update_operation:
      custom_method_name: customUpdateActivity
  StateMachineVersion:
    fields:
      StateMachineARN:
        is_required: true
        is_immutable: true
        is_primary_key: true
        references:
          resource: StateMachine
          path: Status.ACKResourceMetadata.ARN
      Description:
        is_immutable: true
      RevisionID:
        is_immutable: true
    tags:
      ignore: true
    exceptions:
      errors:
        404:
          code: StateMachineDoesNotExist
    find_operation:
      custom_method_name: customFindStateMachineVersion
    update_operation:
      custom_method_name: customUpdateStateMachineVersion
